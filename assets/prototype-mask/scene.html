<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html,body{margin:0;padding:0;background:#02080a;overflow:hidden}
  #stage{display:block}
</style>
</head>
<body>
<canvas id="stage"></canvas>
<script>
// ============================================================
//  DiveSZN — 3D wireframe dive-mask hologram, projected from a stand.
//  Deterministic frame renderer: window.renderFrame(i) draws a perfect
//  360-degree loop across window.TOTAL frames.  Pure canvas 2D, no deps.
// ============================================================

const W = 1080, H = 1350;
const TOTAL = 180;                 // 6s @ 30fps, one full revolution
window.W = W; window.H = H; window.TOTAL = TOTAL;

const cv = document.getElementById('stage');
cv.width = W; cv.height = H;
cv.style.width = W + 'px'; cv.style.height = H + 'px';
const ctx = cv.getContext('2d');

// ---- palette (DiveSZN teal) ----
const INK  = '14,117,105';         // #0e7569  peak teal
const GLOW = '92,222,204';         // bright cyan-teal
const CORE = '196,255,244';        // near-white core

// ---- camera / projection ----
const camZ = 6.2;
const focal = W * 2.35;
const cx = W / 2;
const cyBase = H * 0.395;          // hologram vertical centre
const tiltX = -0.14;               // look slightly down onto the piece

// ============================================================
//  Geometry  (model space, +z toward viewer, mask faces +z)
//  Everything is a polyline: {pts:[[x,y,z]...], closed, w}
//    w = base intensity weight
// ============================================================
const P = [];   // polylines
function poly(pts, closed, w){ P.push({pts, closed:!!closed, w:w==null?1:w}); }

// superellipse ring (rounded-rectangle-ish loop) in a plane z=const
function seRing(cx0, cy0, z, a, b, n, count){
  const r = [];
  for (let i=0;i<count;i++){
    const t = i/count*Math.PI*2;
    const c = Math.cos(t), s = Math.sin(t);
    const x = cx0 + a * Math.sign(c) * Math.pow(Math.abs(c), 2/n);
    const y = cy0 + b * Math.sign(s) * Math.pow(Math.abs(s), 2/n);
    r.push([x, y, z]);
  }
  return r;
}

// =====  SCUBA DIVE MASK  (single tempered lens + nose pocket)  =====
//  Anatomy that makes it read as a dive mask, not goggles:
//   1. one wide domed lens up top   2. a nose-pocket pouch bulging
//   forward + down below it   3. a soft skirt tapering back to a
//   face-seal oval   4. a split head strap on side buckles.
const CT = 84;                     // points per ring
const nRR = 3.0;                   // rounded-rectangle exponent (lens/frame)

// ---- front frame plane + the lens ----
const zF = 0.46;                   // frame front plane
const fw = 1.12, fh = 0.66;        // frame half-size (wider than tall)
const frameRing = seRing(0, 0, zF, fw, fh, nRR, CT);
poly(frameRing, true, 1.35);                                  // bright bezel
const lensRing  = seRing(0, 0, zF+0.02, fw*0.90, fh*0.85, nRR, CT);
poly(lensRing, true, 1.05);                                   // glass edge
// domed glass: concentric rings + radial spokes toward a forward apex
const gApex = [0, 0, zF+0.22];
for (let c=1;c<=2;c++){
  const s  = 1 - c*0.30;
  const zz = (zF+0.02) + (gApex[2]-(zF+0.02))*(c/3);
  poly(seRing(0, 0, zz, fw*0.90*s, fh*0.85*s, nRR, 56), true, 0.5);
}
const gEdge = seRing(0, 0, zF+0.02, fw*0.90, fh*0.85, nRR, 56);
for (let i=0;i<56;i+=7) poly([gApex, gEdge[i]], false, 0.38);

// ---- skirt: loft frame -> face-seal oval, with a soft silicone bulge ----
const zB = -0.62;                  // face-seal plane
const sealW = 1.30, sealH = 1.08;  // seal half-size (taller -> covers cheeks)
const sealYo = -0.16;              // seal centre drops over the nose
const SK = 7;
const skirtRings = [];
for (let k=0;k<=SK;k++){
  const t = k/SK;
  const bulge = Math.sin(t*Math.PI)*0.09;          // barrel out then seal
  const w = fw + (sealW-fw)*t + bulge;
  const h = fh + (sealH-fh)*t + bulge;
  const z = zF + (zB-zF)*t;
  const ring = seRing(0, sealYo*t, z, w, h, nRR - 0.7*t, CT); // softens to oval
  skirtRings.push(ring);
  poly(ring, true, k===SK ? 1.05 : 0.34);          // sealing lip brighter
}
for (let i=0;i<CT;i+=7)                              // sparse soft rails
  poly(skirtRings.map(r=>r[i]), false, 0.30);

// ---- nose pocket: pouch bulging forward + downward from lower frame ----
const NP = 6;
const npRings = [];
for (let k=0;k<=NP;k++){
  const t  = k/NP;
  const cyv = -fh*0.86 - t*0.70;                    // travels down
  const czv = zF + Math.sin(t*Math.PI*0.85)*0.36;   // forward belly then tip
  const w = 0.54*(1-0.74*t) + 0.05;
  const h = 0.17*(1-0.45*t) + 0.05;
  const ring = seRing(0, cyv, czv, w, h, 2.5, 40);
  npRings.push(ring);
  poly(ring, true, k===0 ? 0.5 : 0.78);
}
for (let i=0;i<40;i+=5)
  poly(npRings.map(r=>r[i]), false, 0.42);

// ---- split head strap + side buckles ----
function strapArc(y){
  const pts = [];
  const cxo=0, czo=-0.95, rx=1.16, rz=1.12;
  const a0 = -0.20*Math.PI, a1 = 1.20*Math.PI, seg = 54;
  for (let i=0;i<=seg;i++){
    const t = a0 + (a1-a0)*i/seg;
    pts.push([cxo + rx*Math.cos(t), y, czo + rz*Math.sin(t)]);
  }
  poly(pts, false, 0.5);
}
strapArc( 0.18);
strapArc(-0.28);
[1,-1].forEach(sgn=>{                                // buckle tab at each side
  const bx = sgn*1.22, bz = -0.16;
  poly([[bx,0.20,bz+0.06],[bx,-0.30,bz+0.06],
        [bx+sgn*0.14,-0.30,bz-0.10],[bx+sgn*0.14,0.20,bz-0.10]], true, 0.55);
});

// ============================================================
//  Transform + project
// ============================================================
const MODEL_SCALE = 0.56;   // shrink so the hologram floats above the stand
const MODEL_LIFT  = 0.54;   // raise it clear of the emitter (nose pocket hangs low)
function xform(p, ang, bob){
  let x = p[0]*MODEL_SCALE, y = p[1]*MODEL_SCALE, z = p[2]*MODEL_SCALE;
  // spin about Y
  const cA=Math.cos(ang), sA=Math.sin(ang);
  let x1 =  x*cA + z*sA;
  let z1 = -x*sA + z*cA;
  let y1 =  y + bob + MODEL_LIFT;
  // tilt about X
  const cB=Math.cos(tiltX), sB=Math.sin(tiltX);
  let y2 = y1*cB - z1*sB;
  let z2 = y1*sB + z1*cB;
  return [x1, y2, z2];
}
function project(p, cy){
  const s = focal/(camZ - p[2]);
  return [cx + p[0]*s, cy - p[1]*s, p[2]];
}

// ============================================================
//  Drawing helpers
// ============================================================
function strokePoly(scr, closed, alpha, wide, colWide, colCore){
  ctx.beginPath();
  ctx.moveTo(scr[0][0], scr[0][1]);
  for (let i=1;i<scr.length;i++) ctx.lineTo(scr[i][0], scr[i][1]);
  if (closed) ctx.closePath();
  // soft halo pass
  ctx.lineJoin='round'; ctx.lineCap='round';
  ctx.shadowColor = 'rgba('+GLOW+','+(0.9*alpha)+')';
  ctx.shadowBlur = 16;
  ctx.strokeStyle = 'rgba('+colWide+','+(0.28*alpha)+')';
  ctx.lineWidth = wide;
  ctx.stroke();
  // bright core pass
  ctx.shadowBlur = 5;
  ctx.strokeStyle = 'rgba('+colCore+','+(0.92*alpha)+')';
  ctx.lineWidth = 1.15;
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawBackground(p){
  // deep radial well
  const g = ctx.createRadialGradient(cx, H*0.52, 60, cx, H*0.52, H*0.85);
  g.addColorStop(0, '#06171a');
  g.addColorStop(0.55, '#040f12');
  g.addColorStop(1, '#01070a');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);
}

function drawFloorGrid(p){
  // perspective grid on the stand's plane
  const fy = H*0.815;             // floor line at pedestal base
  const vanish = H*0.60;
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.strokeStyle = 'rgba('+INK+',0.16)';
  ctx.lineWidth = 1;
  // radial lines
  for (let i=-6;i<=6;i++){
    const x = cx + i*90;
    ctx.beginPath();
    ctx.moveTo(cx + (x-cx)*0.12, vanish);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  // depth rings (ellipses)
  for (let r=1;r<=7;r++){
    const t = r/7;
    const yy = vanish + (H-vanish)*t;
    const rw = 40 + 620*t*t;
    const rh = rw*0.20;
    ctx.beginPath();
    ctx.ellipse(cx, yy, rw, rh, 0, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba('+INK+','+(0.05+0.10*t)+')';
    ctx.stroke();
  }
  ctx.restore();
}

function drawCone(p, flick){
  // volumetric projection cone from emitter up to hologram
  const emY = H*0.735, emHalf = 78;
  const topY = H*0.235, topHalf = 470;
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  const g = ctx.createLinearGradient(0, emY, 0, topY);
  g.addColorStop(0, 'rgba('+GLOW+','+(0.20*flick)+')');
  g.addColorStop(0.4, 'rgba('+INK+','+(0.09*flick)+')');
  g.addColorStop(1, 'rgba('+INK+',0)');
  ctx.beginPath();
  ctx.moveTo(cx-emHalf, emY);
  ctx.lineTo(cx+emHalf, emY);
  ctx.lineTo(cx+topHalf, topY);
  ctx.lineTo(cx-topHalf, topY);
  ctx.closePath();
  ctx.fillStyle = g;
  ctx.fill();
  // shimmer beams
  ctx.strokeStyle = 'rgba('+GLOW+','+(0.10*flick)+')';
  ctx.lineWidth = 1;
  for (let i=-3;i<=3;i++){
    const bx = i/3;
    ctx.beginPath();
    ctx.moveTo(cx + bx*emHalf, emY);
    ctx.lineTo(cx + bx*topHalf, topY);
    ctx.stroke();
  }
  ctx.restore();
}

function drawStand(p, flick){
  const topY = H*0.735;
  const botY = H*0.815;
  const topHalf = 96, botHalf = 150;
  ctx.save();
  // pedestal body
  ctx.beginPath();
  ctx.moveTo(cx-topHalf, topY);
  ctx.lineTo(cx+topHalf, topY);
  ctx.lineTo(cx+botHalf, botY);
  ctx.lineTo(cx-botHalf, botY);
  ctx.closePath();
  const bg = ctx.createLinearGradient(0, topY, 0, botY);
  bg.addColorStop(0, '#0b1c1f');
  bg.addColorStop(1, '#051012');
  ctx.fillStyle = bg;
  ctx.fill();
  ctx.strokeStyle = 'rgba('+INK+',0.55)';
  ctx.lineWidth = 1.4;
  ctx.stroke();
  // side edges highlight
  ctx.strokeStyle = 'rgba('+GLOW+',0.35)';
  ctx.beginPath(); ctx.moveTo(cx-topHalf,topY); ctx.lineTo(cx-botHalf,botY);
  ctx.moveTo(cx+topHalf,topY); ctx.lineTo(cx+botHalf,botY); ctx.stroke();
  // base ellipse
  ctx.beginPath();
  ctx.ellipse(cx, botY, botHalf, botHalf*0.16, 0, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba('+INK+',0.5)';
  ctx.stroke();
  // emitter disk (glowing top)
  ctx.globalCompositeOperation = 'screen';
  const eg = ctx.createRadialGradient(cx, topY, 2, cx, topY, topHalf*1.2);
  eg.addColorStop(0, 'rgba('+CORE+','+(0.95*flick)+')');
  eg.addColorStop(0.35, 'rgba('+GLOW+','+(0.6*flick)+')');
  eg.addColorStop(1, 'rgba('+INK+',0)');
  ctx.fillStyle = eg;
  ctx.beginPath();
  ctx.ellipse(cx, topY, topHalf, topHalf*0.26, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = 'rgba('+CORE+','+(0.8*flick)+')';
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.ellipse(cx, topY, topHalf, topHalf*0.26, 0, 0, Math.PI*2);
  ctx.stroke();
  ctx.restore();
}

// scanlines + flicker overlay confined to the hologram band
function drawScanlines(p, cy){
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  // static faint scanlines
  ctx.fillStyle = 'rgba('+GLOW+',0.045)';
  for (let y=Math.round(H*0.10); y<H*0.78; y+=4){ ctx.fillRect(0,y,W,1.4); }
  // moving bright scan band (loops)
  const band = (p*1.0)%1;
  const by = H*0.10 + (H*0.66)*band;
  const bg = ctx.createLinearGradient(0, by-40, 0, by+40);
  bg.addColorStop(0,'rgba('+GLOW+',0)');
  bg.addColorStop(0.5,'rgba('+CORE+',0.10)');
  bg.addColorStop(1,'rgba('+GLOW+',0)');
  ctx.fillStyle = bg;
  ctx.fillRect(0, by-40, W, 80);
  ctx.restore();
}

function drawHUD(p, ang){
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.font = '15px ui-monospace, Menlo, monospace';
  ctx.fillStyle = 'rgba('+GLOW+',0.75)';
  ctx.textBaseline = 'top';
  // corner brackets
  const m=34, L=26;
  ctx.strokeStyle='rgba('+INK+',0.6)'; ctx.lineWidth=1.4;
  const brk=(x,y,dx,dy)=>{ctx.beginPath();ctx.moveTo(x+dx*L,y);ctx.lineTo(x,y);ctx.lineTo(x,y+dy*L);ctx.stroke();};
  brk(m,m,1,1); brk(W-m,m,-1,1); brk(m,H-m,1,-1); brk(W-m,H-m,-1,-1);
  // labels
  ctx.fillText('DIVESZN // DIVE-MASK  PROTOTYPE', m+14, m+8);
  ctx.fillText('REV 0.1  —  WIREFRAME', m+14, m+30);
  const deg = ((ang*180/Math.PI)%360+360)%360;
  ctx.textAlign='right';
  ctx.fillText('AZ '+deg.toFixed(0).padStart(3,'0')+'°', W-m-14, m+8);
  ctx.fillText('PROJECTION ACTIVE', W-m-14, m+30);
  // blink dot
  const on = (Math.floor(p*TOTAL/12)%2)===0;
  ctx.fillStyle = on ? 'rgba('+CORE+',0.9)' : 'rgba('+INK+',0.3)';
  ctx.beginPath(); ctx.arc(W-m-150, m+16, 4, 0, Math.PI*2); ctx.fill();
  ctx.textAlign='left';
  ctx.fillStyle='rgba('+GLOW+',0.6)';
  ctx.fillText('SCAN', W-m-138, m+9);
  // baseline caption near stand
  ctx.textAlign='center';
  ctx.fillStyle='rgba('+GLOW+',0.55)';
  ctx.font='13px ui-monospace, Menlo, monospace';
  ctx.fillText('HOLO-PROJECTOR  ·  MK-I  ·  SCALE 1:1', cx, H*0.845);
  ctx.restore();
}

// light film grain (loop-stable: phase driven by frame)
let grainCv=null, grainCtx=null;
function buildGrain(){
  grainCv=document.createElement('canvas'); grainCv.width=160; grainCv.height=160;
  grainCtx=grainCv.getContext('2d');
  const id=grainCtx.createImageData(160,160);
  for (let i=0;i<id.data.length;i+=4){
    const v=(Math.sin(i*12.9898)*43758.5453)%1; const n=Math.abs(v)*255;
    id.data[i]=id.data[i+1]=id.data[i+2]=n; id.data[i+3]=255;
  }
  grainCtx.putImageData(id,0,0);
}
buildGrain();
function drawGrain(p){
  ctx.save();
  ctx.globalCompositeOperation='screen';
  ctx.globalAlpha=0.035;
  const off=(p*160)|0;
  for (let x=-off%160; x<W; x+=160)
    for (let y=-off%160; y<H; y+=160)
      ctx.drawImage(grainCv, x, y);
  ctx.restore();
}

function drawVignette(){
  const g=ctx.createRadialGradient(cx,H*0.5,H*0.3, cx,H*0.5,H*0.75);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}

// ============================================================
//  Master frame renderer
// ============================================================
function renderFrame(i){
  const p = (i % TOTAL) / TOTAL;          // 0..1
  const ang = -0.55 + p * Math.PI * 2;    // start on a 3/4 view; seamless loop
  const bob = Math.sin(p*Math.PI*2) * 0.05;
  const cy  = cyBase - bob*focal/(camZ)*0.0;  // (bob handled in model Y)
  // holographic flicker (integer cycles -> loops)
  const flick = 0.90 + 0.06*Math.sin(p*2*Math.PI*6) + 0.04*Math.sin(p*2*Math.PI*13);

  drawBackground(p);
  drawFloorGrid(p);
  drawCone(p, flick);

  // ---- hologram: transform + depth-sort polylines, draw back-to-front ----
  const draw = [];
  for (const pl of P){
    const scr = pl.pts.map(pt => project(xform(pt, ang, bob), cyBase));
    let zsum=0; for (const s of scr) zsum+=s[2];
    draw.push({scr, closed:pl.closed, w:pl.w, z:zsum/scr.length});
  }
  draw.sort((a,b)=>a.z-b.z);              // far first
  ctx.save();
  ctx.globalCompositeOperation='screen';
  for (const d of draw){
    // depth cue: nearer (higher z) brighter
    const depth = Math.max(0, Math.min(1, (d.z + 1.6)/3.2));
    const alpha = (0.35 + 0.65*depth) * d.w * flick;
    strokePoly(d.scr, d.closed, Math.min(1, alpha), 3.0, GLOW, CORE);
  }
  ctx.restore();

  drawScanlines(p, cy);
  drawStand(p, flick);
  drawHUD(p, ang);
  drawGrain(p);
  drawVignette();
}
window.renderFrame = renderFrame;

// initial paint + ready flag
renderFrame(0);
window.__ready = true;
</script>
</body>
</html>
