name: Fetch marine-life images

# Bakes one photo per marine-life encounter into marine-life.json.
# Runs on GitHub's runners (which have internet — the dev sandbox does not).
# Images come from Wikimedia Commons keyword search (no API key needed).

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Refetch all encounters (overwrite existing images)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: fetch-marine-images
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deploy branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch marine images
        run: python3 scripts/fetch_marine_images.py ${{ inputs.force && '--force' || '' }}

      - name: Rebuild standalone single-file build and static pages
        run: |
          python3 scripts/build_standalone.py
          python3 scripts/build_pages.py

      - name: Commit baked images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add marine-life.json diving-site.html marine-life sitemap.xml robots.txt
          if git diff --cached --quiet; then
            echo "No image changes to commit."
          else
            git commit -m "Bake marine-life images into data (automated)"
            git push
          fi
