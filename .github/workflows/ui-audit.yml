name: UI audit (screenshot the app for visual review)

# Renders the current app in headless Chromium on the runner and pushes
# full-page screenshots (desktop + mobile) to the orphan branch ui-audit,
# so the sandboxed dev session can pull and visually review the real UI.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  shoot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y >/dev/null
          npm i playwright@1.49.0 >/dev/null
          npx playwright install --with-deps chromium

      - name: Screenshot views
        run: |
          python3 -m http.server 8080 &
          sleep 2
          cat > shoot.mjs <<'EOF'
          import { chromium } from 'playwright';
          import fs from 'fs';
          fs.mkdirSync('shots', {recursive: true});
          const b = await chromium.launch();
          async function shoot(label, w, steps){
            const pg = await b.newPage({viewport:{width:w, height:900}});
            pg.on('response', r => { if (r.request().resourceType() === 'image' && r.status() >= 400)
              console.log('IMG-FAIL', r.status(), r.url().slice(-72)); });
            pg.on('requestfailed', r => { if (r.resourceType() === 'image')
              console.log('IMG-ERR', (r.failure()||{}).errorText, r.url().slice(-72)); });
            await pg.goto('http://localhost:8080/index.html');
            await pg.waitForTimeout(2500);
            if (steps) await steps(pg);
            await pg.waitForTimeout(800);
            await pg.screenshot({path:`shots/${label}.png`, fullPage:true});
            await pg.close();
            console.log('shot', label);
          }
          const views = [
            ['home', null],
            ['planner', async p=>{await p.click('#tab-planner'); await p.waitForTimeout(900);}],
            ['browse', async p=>{await p.click('#tab-planner'); await p.waitForTimeout(900);
              await p.evaluate(()=>{var r=document.querySelectorAll('#browseDir .bregion');
                if(r[0])r[0].classList.add('open'); if(r[1])r[1].classList.add('open');});
              await p.evaluate(()=>document.getElementById('browseDir').scrollIntoView());
              await p.waitForTimeout(2500);}],
            ['trip', async p=>{await p.click('#tab-trip'); await p.waitForTimeout(600);}],
            ['profile', async p=>{await p.click('#tab-planner'); await p.waitForTimeout(900);
              await p.click('#planGrid .card.photo-card'); await p.waitForTimeout(900);}],
            ['gear-article', async p=>{await p.click('#tab-gear'); await p.waitForTimeout(500);
              await p.evaluate(()=>{document.getElementById('gearCat').value='Masks'; renderGear();});
              await p.waitForTimeout(700);}],
            ['dest-article', async p=>{await p.click('#tab-destinations'); await p.waitForTimeout(500);
              await p.click('#destBody .artrow'); await p.waitForTimeout(800);}],
            ['marine', async p=>{await p.click('#tab-marine'); await p.waitForTimeout(800);}],
            ['marine-article', async p=>{await p.click('#tab-marine'); await p.waitForTimeout(500);
              await p.click('#view-marine .artrow'); await p.waitForTimeout(900);}],
          ];
          for (const [name, steps] of views){
            await shoot(`d-${name}`, 1280, steps);
            await shoot(`m-${name}`, 390, steps);
          }
          await b.close();
          EOF
          node shoot.mjs

      - name: Push to orphan audit branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan ui-audit
          git rm -rf --cached . >/dev/null
          git add -f shots
          git commit -m "UI audit screenshots (automated)"
          git push -f origin ui-audit
