name: Audit marine images (download for visual review)

# Downloads every marine-life.json image to an orphan branch so the sandboxed
# dev session (which cannot reach Wikimedia) can pull and visually verify each
# photo actually shows the animal it claims. Throwaway branch: marine-audit.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download images
        run: |
          python3 - <<'EOF'
          import json, os, urllib.request
          UA = {"User-Agent": "DiveSZNAudit/1.0 (https://github.com/DonLybero/Diving-site)"}
          def grab(url, path):
              req = urllib.request.Request(url, headers=UA)
              with urllib.request.urlopen(req, timeout=30) as r:
                  blob = r.read()
              with open(path, "wb") as f:
                  f.write(blob)
              return len(blob)
          os.makedirs("audit", exist_ok=True)
          for e in json.load(open("marine-life.json"))["experiences"]:
              url = e.get("image")
              if not url:
                  print("no image:", e["slug"]); continue
              print("ok:", e["slug"], grab(url, f"audit/{e['slug']}.jpg")//1024, "KB")
          os.makedirs("audit/dest", exist_ok=True)
          for d in json.load(open("diving-destinations.json"))["destinations"]:
              url = d.get("image")
              if not url:
                  print("no image:", d["slug"]); continue
              try:
                  print("ok:", d["slug"], grab(url, f"audit/dest/{d['slug']}.jpg")//1024, "KB")
              except Exception as ex:
                  print("FAIL:", d["slug"], ex)
          EOF

      - name: Push to orphan audit branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan marine-audit
          git rm -rf --cached . >/dev/null
          git add -f audit
          git commit -m "Marine image audit snapshot (automated)"
          git push -f origin marine-audit
